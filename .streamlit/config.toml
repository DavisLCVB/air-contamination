# Tema visual del dashboard — Catppuccin Mocha (oscuro), consistente con los
# colores declarados en src/theme.py para los gráficos matplotlib.
[theme]
base = "dark"
primaryColor = "#cba6f7"            # mauve — botones, tabs activas, sliders
backgroundColor = "#1e1e2e"         # base
secondaryBackgroundColor = "#313244"  # surface0 — sidebar, cards, widgets
textColor = "#cdd6f4"                # text
font = "sans-serif"
